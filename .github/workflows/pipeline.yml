name: NSE Volume Breakout Pipeline

on:
  schedule:
    # 09:25 UTC = 14:55 IST — fires before the 15:00/15:15 IST entry window
    - cron: '25 9 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore master_data + checkpoints cache ──────────────────────────
      # Cache persists parquet/CSV files between runs. On cache miss (first run
      # or cache eviction), bootstrap from the GitHub Release asset instead.
      - name: Restore data cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            master_data/
            checkpoints/
          key: nse-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nse-data-${{ runner.os }}-

      - name: Bootstrap master_data from release (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — downloading master_data bootstrap from GitHub Release..."
          curl -L -o master_data.tar.gz \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://github.com/rashil0904/volume-breakout/releases/download/master-data-bootstrap/master_data.tar.gz"
          tar -xzf master_data.tar.gz
          rm master_data.tar.gz
          echo "Bootstrap complete. $(ls master_data/ | wc -l) parquet files loaded."

      # ── 4. Pipeline steps ───────────────────────────────────────────────────
      - name: "Step 1/3 — fetch_market_cap.py"
        id: mcap
        env:
          SCREENER_EMAIL:    ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        run: |
          python fetch_market_cap.py
          echo "mcap_exit=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true   # stale/failed mcap never blocks the pipeline

      - name: "Step 2/3 — data_loading.py"
        id: data_loading
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: python data_loading.py

      - name: "Step 3/3 — prepare_data.py"
        id: prepare_data
        run: python prepare_data.py

      # ── 5. Notification (always runs, even after failure) ───────────────────
      - name: Send email notification
        if: always()
        env:
          SENDER_EMAIL:        ${{ secrets.GMAIL_USERNAME }}
          SENDER_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # Determine overall pipeline status
          if [[ "${{ steps.data_loading.outcome }}" != "success" ]]; then
            STATUS="failed"
            FAILED_STEP="data_loading.py"
          elif [[ "${{ steps.prepare_data.outcome }}" != "success" ]]; then
            STATUS="failed"
            FAILED_STEP="prepare_data.py"
          else
            STATUS="success"
            FAILED_STEP=""
          fi

          # Map mcap exit code to status string
          MCAP_EXIT="${{ steps.mcap.outputs.mcap_exit }}"
          if   [[ "$MCAP_EXIT" == "2" ]]; then MCAP_STATUS="stale"
          elif [[ "$MCAP_EXIT" == "1" ]]; then MCAP_STATUS="failed"
          else                                  MCAP_STATUS="fresh"
          fi

          # IST date
          TODAY_IST=$(python -c "
          from datetime import datetime, timezone, timedelta
          print(datetime.now(timezone(timedelta(hours=5,minutes=30))).strftime('%Y-%m-%d'))
          ")

          python notify.py \
            --status       "$STATUS"          \
            --date         "$TODAY_IST"        \
            --log          /dev/null           \
            --failed-step  "$FAILED_STEP"      \
            --mcap-status  "$MCAP_STATUS"      \
            --start-ts     "${{ github.event.repository.pushed_at || 0 }}"

      # ── 6. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload pipeline output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            results/
            market_cap_daily/
          if-no-files-found: warn
          retention-days: 7
